<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:url" content="https://lovinoes.github.io/ndot-logo-generator/">
  <meta name="twitter:title" content="Ndot Logo Generator">
  <meta name="twitter:description" content="Small, vibe-coded HTML logo generator using the Nothing fonts.">
  <meta name="twitter:site" content="@lovinoes">
  <meta name="twitter:creator" content="@lovinoes">
  <meta name="twitter:image" content="https://github.com/user-attachments/assets/72274e96-3cf8-4f91-b6c3-e6729b59bd9b">
  <meta name="twitter:image:alt" content="Small, vibe-coded HTML logo generator using the Nothing fonts.">
  <title>Ndot Logo Generator</title>
  <style>
    @font-face { font-family: 'Ndot55';     src: url('https://raw.githubusercontent.com/xeji01/nothingfont/refs/heads/main/fonts/Ndot55-Regular.otf')     format('opentype'); }
    @font-face { font-family: 'Ndot55Caps'; src: url('https://raw.githubusercontent.com/xeji01/nothingfont/refs/heads/main/fonts/Ndot55Caps-Regular.otf') format('opentype'); }
    @font-face { font-family: 'Ndot57';     src: url('https://raw.githubusercontent.com/xeji01/nothingfont/refs/heads/main/fonts/Ndot57-Regular.otf')     format('opentype'); }
    @font-face { font-family: 'Ndot57Caps'; src: url('https://raw.githubusercontent.com/xeji01/nothingfont/refs/heads/main/fonts/Ndot57Caps-Regular.otf') format('opentype'); }
    @font-face { font-family: 'NType82';    src: url('https://raw.githubusercontent.com/xeji01/nothingfont/refs/heads/main/fonts/NType82-Regular.otf')    format('opentype'); }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #080808;
      --panel:       #0e0e0e;
      --panel2:      #121212;
      --border:      #222;
      --border-hi:   #3a3a3a;
      --text:        #d8d8d8;
      --text-mid:    #888;
      --text-dim:    #777;
      --text-dimmer: #585858;
      --input-bg:    #131313;
      --tag-bg:      #161616;
      --sidebar-w:   320px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
      overflow: hidden;
    }

    /* ── SHELL ── */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 4px 1fr;
      grid-template-rows: 46px 1fr 58px;
      height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--border);
      padding: 0 0 0 0;
      display: flex;
      align-items: stretch;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 22px;
      border-right: 1px solid var(--border);
      width: var(--sidebar-w);
      flex-shrink: 0;
      gap: 2px;
    }
    .header-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-mid);
      line-height: 1;
    }
    .header-sub {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .header-right {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
    }
    .header-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-hi); }
    .header-meta { font-size: 10px; color: var(--text-dimmer); letter-spacing: 0.08em; }

    /* ── RESIZE HANDLE ── */
    .resize-handle {
      grid-row: 2 / 3;
      grid-column: 2;
      background: transparent;
      cursor: col-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      transition: background 0.15s;
    }
    .resize-handle::after {
      content: '';
      width: 1px;
      height: 100%;
      background: var(--border);
      transition: background 0.15s, width 0.15s;
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: var(--border-hi);
      width: 2px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      grid-row: 2;
      grid-column: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: none;
    }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sec-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      padding: 12px 2px 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* BG CARD */
    .bg-card { border:1px solid var(--border); border-radius:5px; background:var(--panel); padding:10px 12px; }
    .bg-card-row { display:flex; align-items:center; gap:8px; }
    .bg-card-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); flex:1; }

    /* LINE CARD */
    .line-card { border:1px solid var(--border); border-radius:5px; background:var(--panel); overflow:hidden; }
    .line-card.drag-over { border-color:var(--border-hi); }
    .line-card.dragging  { opacity:0.35; }

    .line-card-header {
      display:flex; align-items:center; gap:7px;
      padding:8px 11px 8px 9px; cursor:grab;
      border-bottom:1px solid var(--border);
      background:var(--panel2);
    }
    .line-card-header:active { cursor:grabbing; }
    .drag-handle { display:flex; flex-direction:column; gap:2.5px; flex-shrink:0; }
    .drag-handle span { display:block; width:13px; height:1.5px; border-radius:1px; background:var(--text-dimmer); }
    .line-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-mid); flex:1; }
    .remove-btn { background:none; border:none; color:var(--text-dimmer); font-size:15px; line-height:1; cursor:pointer; padding:0 1px; transition:color 0.1s; }
    .remove-btn:hover { color:#aaa; }
    .line-card-body { padding:11px 12px; display:flex; flex-direction:column; gap:9px; }

    .field { display:flex; flex-direction:column; gap:4px; }
    .field > label, .slider-row > label {
      font-size:9px; letter-spacing:0.13em; text-transform:uppercase; color:var(--text-dim);
    }
    input[type="text"], select {
      background:var(--input-bg); border:1px solid #222; border-radius:3px;
      color:var(--text); font-family:inherit; font-size:12px; padding:6px 9px;
      outline:none; width:100%; -webkit-appearance:none;
      transition:border-color 0.12s, color 0.12s;
    }
    input[type="text"]:focus, select:focus { border-color:var(--border-hi); color:#fff; }
    input[type="text"]::placeholder { color:#252525; }
    select { cursor:pointer; }
    select option { background:#131313; color:var(--text); }

    .slider-row { display:flex; flex-direction:column; gap:4px; }
    .slider-track { display:flex; align-items:center; gap:7px; }
    .slider-track input[type="range"] {
      flex:1; -webkit-appearance:none; height:2px; background:#242424;
      border-radius:2px; outline:none; cursor:pointer;
      padding:0; width:auto; border:none; color:unset;
    }
    .slider-track input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance:none; width:13px; height:13px;
      border-radius:50%; background:#555; cursor:pointer; transition:background 0.12s;
    }
    .slider-track input[type="range"]::-webkit-slider-thumb:hover { background:#bbb; }
    .slider-val { font-size:10px; color:var(--text-mid); width:32px; text-align:right; flex-shrink:0; }
    .step-btns { display:flex; gap:2px; margin-top:1px; }
    .step-btn {
      background:var(--tag-bg); border:1px solid var(--border); border-radius:2px;
      color:var(--text-dim); font-family:inherit; font-size:9px; padding:3px 0;
      cursor:pointer; flex:1; text-align:center; transition:color 0.1s, border-color 0.1s;
    }
    .step-btn:hover { color:var(--text); border-color:var(--border-hi); }

    .color-row { display:flex; align-items:center; gap:6px; }
    .color-swatch {
      width:26px; height:26px; border-radius:3px; border:1px solid #2e2e2e;
      cursor:pointer; flex-shrink:0; position:relative; overflow:hidden;
    }
    .color-swatch input[type="color"] {
      position:absolute; inset:0; width:100%; height:100%;
      opacity:0; cursor:pointer; border:none; padding:0;
    }
    .hex-input { font-size:11px !important; padding:4px 7px !important; letter-spacing:0.06em; }

    .add-line-btn {
      background:var(--tag-bg); border:1px dashed var(--border); border-radius:5px;
      color:var(--text-dim); font-family:inherit; font-size:11px;
      padding:9px 12px; cursor:pointer; width:100%; text-align:left;
      letter-spacing:0.06em; transition:color 0.12s, border-color 0.12s;
    }
    .add-line-btn:hover { color:var(--text); border-color:var(--border-hi); }

    .credit-card { border:1px solid var(--border); border-radius:5px; background:var(--panel); padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
    .credit-card-header { display:flex; align-items:center; justify-content:space-between; }
    .credit-row { display:flex; align-items:center; gap:5px; }
    .credit-row input[type="text"] { flex:1; }
    .credit-remove-btn { background:none; border:none; color:var(--text-dimmer); font-size:14px; cursor:pointer; transition:color 0.12s; }
    .credit-remove-btn:hover { color:#aaa; }
    .add-credit-btn {
      background:none; border:none; color:var(--text-dim);
      font-family:inherit; font-size:10px; letter-spacing:0.1em;
      cursor:pointer; padding:0; transition:color 0.12s; align-self:flex-start;
    }
    .add-credit-btn:hover { color:var(--text); }

    /* ── MAIN ── */
    .main {
      grid-row: 2;
      grid-column: 3;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px; overflow:hidden; padding:24px;
      position:relative;
    }

    /* SIZE TABS */
    .size-tabs-wrap { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .size-tabs-label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); }
    .size-tabs {
      display:flex; gap:3px; background:var(--panel2);
      border:1px solid var(--border); border-radius:5px; padding:3px;
    }
    .size-tab {
      background:transparent; border:1px solid transparent; border-radius:3px;
      color:var(--text-dim); font-family:inherit; font-size:10px;
      padding:4px 11px; cursor:pointer; letter-spacing:0.06em; transition:all 0.12s;
    }
    .size-tab:hover { color:var(--text-mid); }
    .size-tab.active { background:#1e1e1e; border-color:var(--border-hi); color:var(--text); }

    /* CANVAS */
    .canvas-outer { position:relative; display:flex; align-items:flex-start; justify-content:flex-start; }
    .canvas-badge {
      position:absolute; top:-20px; right:0;
      font-size:9px; color:var(--text-dimmer); letter-spacing:0.12em; pointer-events:none;
    }
    .logo-box {
      width:512px; height:512px;
      background:#000;
      display:flex; flex-direction:column;
      align-items:flex-start; justify-content:center;
      padding:0 56px; overflow:hidden;
      outline:1px solid #2a2a2a;
      transform-origin:top left;
      flex-shrink:0;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .logo-line { display:block; white-space:nowrap; letter-spacing:0.03em; transform-origin:left center; }
    .logo-credit-line { font-family:monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; display:block; }

    /* ── FOOTER ── */
    .footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    /* canvas size tabs moved to footer left area */
    .footer-credits {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.06em;
      flex: 1;
      line-height: 1.9;
    }
    .footer-credits a { color:#333; text-decoration:none; }
    .footer-credits a:hover { color:#666; }

    /* ── DOWNLOAD BUTTON + DROPDOWN ── */
    .dl-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .dl-btn-main {
      background: #181818;
      border: 1px solid #303030;
      border-right: none;
      border-radius: 4px 0 0 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 16px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .dl-btn-main:hover { background:#222; border-color:#555; }
    .dl-btn-main svg { width:11px; height:11px; flex-shrink:0; }
    .dl-size-badge {
      font-size:9px; color:var(--text-dim);
      letter-spacing:0.06em; margin-left:1px;
    }

    .dl-arrow-btn {
      background: #181818;
      border: 1px solid #303030;
      border-radius: 0 4px 4px 0;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 0 9px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      border-left: 1px solid #252525;
    }
    .dl-arrow-btn:hover { background:#222; border-color:#555; color:var(--text); }
    .dl-arrow-btn svg { width:10px; height:10px; transition:transform 0.15s; }
    .dl-arrow-btn.open svg { transform:rotate(180deg); }

    /* DROPDOWN MENU */
    .dl-dropdown {
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: #111;
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      min-width: 180px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.15s, transform 0.15s;
      z-index: 100;
    }
    .dl-dropdown.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }
    .dl-dropdown-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      padding: 9px 13px 5px;
      border-bottom: 1px solid var(--border);
    }
    .dl-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 13px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-mid);
      letter-spacing: 0.06em;
      transition: background 0.08s, color 0.08s;
      border: none;
      background: none;
      font-family: inherit;
      width: 100%;
    }
    .dl-option:hover { background:#1a1a1a; color:var(--text); }
    .dl-option.selected { color:var(--text); }
    .dl-option .dl-opt-size { font-size:9px; color:var(--text-dimmer); }
    .dl-option.selected .dl-opt-size { color:var(--text-dim); }
    .dl-option .dl-check { opacity:0; font-size:10px; color:var(--text-mid); }
    .dl-option.selected .dl-check { opacity:1; }

    .dl-custom-row {
      display: flex;
      align-items: center;
      gap: 0;
      border-top: 1px solid var(--border);
      padding: 7px 13px;
    }
    .dl-custom-label { font-size:9px; color:var(--text-dimmer); letter-spacing:0.1em; flex:1; }
    .dl-custom-input {
      background: #1a1a1a !important;
      border: 1px solid #2a2a2a !important;
      border-radius: 3px !important;
      width: 60px !important;
      font-size: 11px !important;
      color: var(--text-mid) !important;
      padding: 3px 6px !important;
      text-align: right;
    }
    .dl-custom-input:focus { color:var(--text) !important; border-color:var(--border-hi) !important; }
    .dl-custom-px { font-size:9px; color:var(--text-dimmer); margin-left:4px; }

    /* scrollbar */
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#1e1e1e; border-radius:2px; }

    /* resize cursor during drag */
    body.resizing { cursor: col-resize !important; user-select: none !important; }
    body.resizing * { pointer-events: none !important; }
    body.resizing .resize-handle { pointer-events: all !important; }
  </style>
</head>
<body>
<div class="shell" id="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand" id="headerBrand">
      <span class="header-title">Ndot Logo Generator</span>
      <span class="header-sub">Nothing Tech typeface · xeji01/nothingfont</span>
    </div>
    <div class="header-right">
      <span class="header-dot"></span>
      <span class="header-meta">drag burger to rearrange</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-scroll">

      <span class="sec-label">Background</span>
      <div class="bg-card">
        <div class="bg-card-row">
          <span class="bg-card-label">Color</span>
          <div class="color-row">
            <div class="color-swatch" id="bgSwatch" style="background:#000000">
              <input type="color" id="bgColorPicker" value="#000000">
            </div>
            <input type="text" class="hex-input" id="bgHexInput" value="#000000" maxlength="7">
          </div>
        </div>
      </div>

      <span class="sec-label">Text Lines</span>
      <div id="linesGrid"></div>
      <button class="add-line-btn" id="addBtn">+ add line</button>

      <span class="sec-label">Credits</span>
      <div class="credit-card">
        <div class="credit-card-header">
          <button class="add-credit-btn" id="addCreditBtn">+ add credit line</button>
        </div>
        <div id="creditRows"></div>
      </div>

    </div>
  </aside>

  <!-- RESIZE HANDLE -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="size-tabs-wrap">
      <span class="size-tabs-label">Canvas / Preview Size</span>
      <div class="size-tabs" id="sizeTabs">
        <button class="size-tab" data-size="64">64</button>
        <button class="size-tab" data-size="128">128</button>
        <button class="size-tab" data-size="256">256</button>
        <button class="size-tab active" data-size="384">384</button>
        <button class="size-tab" data-size="512">512</button>
        <button class="size-tab" data-size="1024">1024</button>
      </div>
    </div>
    <div class="canvas-outer" id="canvasOuter">
      <span class="canvas-badge" id="sizeBadge">384 × 384</span>
      <div class="logo-box" id="logoBox"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-credits">
      Typeface by <a href="https://nothing.tech" target="_blank">NOTHING Tech</a>
      &nbsp;·&nbsp;
      Fonts via <a href="https://github.com/xeji01/nothingfont" target="_blank">xeji01/nothingfont</a>
      <br>
      <a href="https://github.com/Lovinoes/ndot-logo-generator" target="_blank">github.com/Lovinoes/ndot-logo-generator</a>
    </span>

    <!-- DOWNLOAD SPLIT BUTTON -->
    <div class="dl-wrap" id="dlWrap">
      <button class="dl-btn-main" id="downloadBtn">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 1v7M3.5 5.5 6 8l2.5-2.5M2 10.5h8"/>
        </svg>
        Download PNG
        <span class="dl-size-badge" id="dlSizeBadge">· 512 × 512</span>
      </button>
      <button class="dl-arrow-btn" id="dlArrowBtn" title="Choose export size">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 3.5l3 3 3-3"/>
        </svg>
      </button>

      <!-- DROPDOWN -->
      <div class="dl-dropdown" id="dlDropdown">
        <div class="dl-dropdown-label">Export Resolution</div>
        <button class="dl-option" data-res="64">
          <span>64 px</span>
          <span class="dl-opt-size">64 × 64</span>
          <span class="dl-check">✓</span>
        </button>
        <button class="dl-option" data-res="128">
          <span>128 px</span>
          <span class="dl-opt-size">128 × 128</span>
          <span class="dl-check">✓</span>
        </button>
        <button class="dl-option" data-res="256">
          <span>256 px</span>
          <span class="dl-opt-size">256 × 256</span>
          <span class="dl-check">✓</span>
        </button>
        <button class="dl-option" data-res="384">
          <span>384 px</span>
          <span class="dl-opt-size">384 × 384</span>
          <span class="dl-check">✓</span>
        </button>
        <button class="dl-option selected" data-res="512">
          <span>512 px</span>
          <span class="dl-opt-size">512 × 512</span>
          <span class="dl-check">✓</span>
        </button>
        <button class="dl-option" data-res="1024">
          <span>1024 px</span>
          <span class="dl-opt-size">1024 × 1024</span>
          <span class="dl-check">✓</span>
        </button>
        <div class="dl-custom-row">
          <span class="dl-custom-label">Custom</span>
          <input type="text" class="dl-custom-input" id="dlCustomInput" placeholder="2048" maxlength="5">
          <span class="dl-custom-px">px</span>
        </div>
      </div>
    </div>
  </footer>

</div>
<script>
const MAX_LINES = 4, MAX_CREDITS = 2;
const FONTS = ['Ndot55','Ndot55Caps','Ndot57','Ndot57Caps','NType82'];
const FONT_LABELS = ['Ndot-55','Ndot-55 Caps','Ndot-57','Ndot-57 Caps','NType-82'];

let lines = [{ text: 'EXAMPLE', font: 'Ndot57', size: 100, spacing: 0.82, color: '#ffffff' }];
let credits = [];
let bgColor = '#000000';
let previewSize = 384;
let exportRes = 512;

const shell        = document.getElementById('shell');
const sidebar      = document.getElementById('sidebar');
const headerBrand  = document.getElementById('headerBrand');
const resizeHandle = document.getElementById('resizeHandle');
const linesGrid    = document.getElementById('linesGrid');
const addBtn       = document.getElementById('addBtn');
const logoBox      = document.getElementById('logoBox');
const creditRows   = document.getElementById('creditRows');
const addCreditBtn = document.getElementById('addCreditBtn');
const sizeTabs     = document.getElementById('sizeTabs');
const sizeBadge    = document.getElementById('sizeBadge');
const mainArea     = document.getElementById('mainArea');
const downloadBtn  = document.getElementById('downloadBtn');
const dlArrowBtn   = document.getElementById('dlArrowBtn');
const dlDropdown   = document.getElementById('dlDropdown');
const dlSizeBadge  = document.getElementById('dlSizeBadge');
const dlCustomInput= document.getElementById('dlCustomInput');
const bgColorPicker= document.getElementById('bgColorPicker');
const bgHexInput   = document.getElementById('bgHexInput');
const bgSwatch     = document.getElementById('bgSwatch');

/* ── BG ── */
bgColorPicker.addEventListener('input', e => { bgColor=e.target.value; bgSwatch.style.background=bgColor; bgHexInput.value=bgColor; renderLogo(); });
bgHexInput.addEventListener('input', e => {
  const v=e.target.value.startsWith('#')?e.target.value:'#'+e.target.value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){bgColor=v;bgColorPicker.value=v;bgSwatch.style.background=v;renderLogo();}
});

/* ── SIDEBAR RESIZE ── */
let isResizing=false, resizeStartX=0, resizeStartW=0;
resizeHandle.addEventListener('mousedown', e => {
  isResizing=true; resizeStartX=e.clientX;
  resizeStartW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  resizeHandle.classList.add('dragging');
  document.body.classList.add('resizing');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if(!isResizing) return;
  const delta = e.clientX - resizeStartX;
  const newW  = Math.min(520, Math.max(220, resizeStartW + delta));
  document.documentElement.style.setProperty('--sidebar-w', newW+'px');
  headerBrand.style.width = newW+'px';
  applyPreviewScale();
});
document.addEventListener('mouseup', () => {
  if(!isResizing) return;
  isResizing=false;
  resizeHandle.classList.remove('dragging');
  document.body.classList.remove('resizing');
});

/* ── SIZE TABS ── */
sizeTabs.addEventListener('click', e => {
  const tab=e.target.closest('.size-tab'); if(!tab) return;
  document.querySelectorAll('.size-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  previewSize=parseInt(tab.dataset.size);
  sizeBadge.textContent=`${previewSize} × ${previewSize}`;
  applyPreviewScale();
});

function applyPreviewScale() {
  const mw = mainArea.offsetWidth - 48;
  const mh = mainArea.offsetHeight - 96;
  const maxFit = Math.min(mw, mh, 560);
  const scale = Math.min(1, maxFit / previewSize);
  const fs = (previewSize / 512) * scale;
  logoBox.style.transform = `scale(${fs.toFixed(4)})`;
  const shown = Math.round(512 * fs);
  logoBox.style.marginBottom = -(512-shown)+'px';
  logoBox.style.marginRight  = -(512-shown)+'px';
}

/* ── DOWNLOAD DROPDOWN ── */
let dropOpen = false;
function openDrop() { dropOpen=true; dlDropdown.classList.add('open'); dlArrowBtn.classList.add('open'); }
function closeDrop() { dropOpen=false; dlDropdown.classList.remove('open'); dlArrowBtn.classList.remove('open'); }

dlArrowBtn.addEventListener('click', e => { e.stopPropagation(); dropOpen ? closeDrop() : openDrop(); });
document.addEventListener('click', e => { if(dropOpen && !document.getElementById('dlWrap').contains(e.target)) closeDrop(); });

function setExportRes(r, fromCustom) {
  exportRes=r;
  dlSizeBadge.textContent=`· ${r} × ${r}`;
  document.querySelectorAll('.dl-option').forEach(o=>o.classList.toggle('selected',parseInt(o.dataset.res)===r));
  if(!fromCustom) dlCustomInput.value='';
}

dlDropdown.addEventListener('click', e => {
  const opt=e.target.closest('.dl-option'); if(!opt) return;
  setExportRes(parseInt(opt.dataset.res));
  closeDrop();
});

dlCustomInput.addEventListener('input', e => {
  const v=parseInt(e.target.value);
  if(v>=16&&v<=8192){ setExportRes(v,true); }
});
dlCustomInput.addEventListener('keydown', e => { if(e.key==='Enter') closeDrop(); });

/* ── FONT OPTIONS ── */
function fontOptions(sel) {
  return FONTS.map((f,i)=>`<option value="${f}"${f===sel?' selected':''}>${FONT_LABELS[i]}</option>`).join('');
}

/* ── CONTROLS ── */
function renderControls() {
  linesGrid.innerHTML='';
  lines.forEach((line,idx) => {
    const card=document.createElement('div');
    card.className='line-card'; card.dataset.idx=idx; card.draggable=false;
    card.innerHTML=`
      <div class="line-card-header" title="Drag to reorder">
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <span class="line-label">Line ${idx+1}</span>
        ${lines.length>1?`<button class="remove-btn" data-remove="${idx}">×</button>`:''}
      </div>
      <div class="line-card-body">
        <div class="field"><label>Text</label>
          <input type="text" class="line-text" data-idx="${idx}" value="${line.text}" maxlength="16" placeholder="enter text…">
        </div>
        <div class="field"><label>Font</label>
          <select class="line-font" data-idx="${idx}">${fontOptions(line.font)}</select>
        </div>
        <div class="slider-row"><label>Size</label>
          <div class="slider-track">
            <input type="range" class="line-size" data-idx="${idx}" min="16" max="200" value="${line.size}">
            <span class="slider-val" id="sv${idx}">${line.size}</span>
          </div>
          <div class="step-btns">
            <button class="step-btn" data-step="-10" data-idx="${idx}">−10</button>
            <button class="step-btn" data-step="-1"  data-idx="${idx}">−1</button>
            <button class="step-btn" data-step="1"   data-idx="${idx}">+1</button>
            <button class="step-btn" data-step="10"  data-idx="${idx}">+10</button>
          </div>
        </div>
        <div class="slider-row"><label>Line Spacing</label>
          <div class="slider-track">
            <input type="range" class="line-spacing" data-idx="${idx}" min="0.5" max="2" step="0.05" value="${line.spacing}">
            <span class="slider-val" id="sp${idx}">${line.spacing.toFixed(2)}</span>
          </div>
          <div class="step-btns">
            <button class="step-btn" data-stepsp="-0.1"  data-idx="${idx}">−0.1</button>
            <button class="step-btn" data-stepsp="-0.05" data-idx="${idx}">−.05</button>
            <button class="step-btn" data-stepsp="0.05"  data-idx="${idx}">+.05</button>
            <button class="step-btn" data-stepsp="0.1"   data-idx="${idx}">+0.1</button>
          </div>
        </div>
        <div class="field"><label>Color</label>
          <div class="color-row">
            <div class="color-swatch" style="background:${line.color}">
              <input type="color" class="line-colorpicker" data-idx="${idx}" value="${line.color}">
            </div>
            <input type="text" class="hex-input line-hexinput" data-idx="${idx}" value="${line.color}" maxlength="7">
          </div>
        </div>
      </div>`;
    linesGrid.appendChild(card);
  });
  addBtn.style.display=lines.length>=MAX_LINES?'none':'';
  bindDragDrop();
}

/* ── DRAG REORDER ── */
let dragSrc=null;
function bindDragDrop() {
  document.querySelectorAll('.line-card').forEach(card => {
    const handle = card.querySelector('.drag-handle');

    // Only allow drag when mousedown started on the handle
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    document.addEventListener('mouseup', () => { card.draggable = false; }, { passive: true });

    card.addEventListener('dragstart', e=>{
      if (!card.draggable) { e.preventDefault(); return; }
      dragSrc=card; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',   ()=>{card.classList.remove('dragging');document.querySelectorAll('.line-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',  e=>{e.preventDefault();if(card!==dragSrc)card.classList.add('drag-over');});
    card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
    card.addEventListener('drop', e=>{
      e.preventDefault();
      if(dragSrc&&dragSrc!==card){
        const fi=parseInt(dragSrc.dataset.idx),ti=parseInt(card.dataset.idx);
        const[m]=lines.splice(fi,1); lines.splice(ti,0,m);
        renderControls(); renderLogo();
      }
    });
  });
}

/* ── CREDITS ── */
function renderCreditControls() {
  creditRows.innerHTML='';
  credits.forEach((c,idx)=>{
    const row=document.createElement('div'); row.className='credit-row';
    row.innerHTML=`
      <input type="text" class="credit-text" data-idx="${idx}" value="${c.text}" placeholder="credit text…">
      <div class="color-swatch" style="background:${c.color}"><input type="color" class="credit-colorpicker" data-idx="${idx}" value="${c.color}"></div>
      <input type="text" class="hex-input credit-hexinput" data-idx="${idx}" value="${c.color}" maxlength="7" style="width:84px">
      <button class="credit-remove-btn" data-cremove="${idx}">×</button>`;
    creditRows.appendChild(row);
  });
  addCreditBtn.style.display=credits.length>=MAX_CREDITS?'none':'';
}

/* ── RENDER LOGO ── */
function renderLogo() {
  logoBox.innerHTML='';
  logoBox.style.background=bgColor;
  lines.forEach(line=>{
    if(!line.text) return;
    const span=document.createElement('span');
    span.className='logo-line';
    span.textContent=line.text;
    span.style.fontFamily=`'${line.font}',monospace`;
    span.style.fontSize=line.size+'px';
    span.style.lineHeight=line.spacing;
    span.style.color=line.color;
    logoBox.appendChild(span);
    requestAnimationFrame(()=>{
      const avail=512-112;
      span.style.transform=span.scrollWidth>avail?`scaleX(${(avail/span.scrollWidth).toFixed(4)})`:'';
    });
  });
  if(credits.length>0){
    const wrap=document.createElement('div'); wrap.style.marginTop='10px';
    credits.forEach(c=>{
      if(!c.text) return;
      const p=document.createElement('span'); p.className='logo-credit-line';
      p.textContent=c.text; p.style.color=c.color; wrap.appendChild(p);
    });
    logoBox.appendChild(wrap);
  }
}

/* ── LINE EVENTS ── */
linesGrid.addEventListener('input', e=>{
  const t=e.target,idx=parseInt(t.dataset.idx); if(isNaN(idx)) return;
  if(t.classList.contains('line-text'))    lines[idx].text=t.value;
  else if(t.classList.contains('line-font'))    lines[idx].font=t.value;
  else if(t.classList.contains('line-size'))    {lines[idx].size=parseInt(t.value);document.getElementById('sv'+idx).textContent=t.value;}
  else if(t.classList.contains('line-spacing')) {lines[idx].spacing=parseFloat(t.value);document.getElementById('sp'+idx).textContent=parseFloat(t.value).toFixed(2);}
  else if(t.classList.contains('line-colorpicker')){lines[idx].color=t.value;t.closest('.color-swatch').style.background=t.value;t.closest('.color-row').querySelector('.hex-input').value=t.value;}
  else if(t.classList.contains('line-hexinput')){
    const v=t.value.startsWith('#')?t.value:'#'+t.value;
    if(/^#[0-9a-fA-F]{6}$/.test(v)){lines[idx].color=v;t.closest('.color-row').querySelector('.line-colorpicker').value=v;t.closest('.color-row').querySelector('.color-swatch').style.background=v;}
  }
  renderLogo();
});
linesGrid.addEventListener('click', e=>{
  const t=e.target;
  if(t.dataset.remove!==undefined){lines.splice(parseInt(t.dataset.remove),1);renderControls();renderLogo();return;}
  if(t.dataset.step!==undefined){const i=parseInt(t.dataset.idx);lines[i].size=Math.min(200,Math.max(16,lines[i].size+parseInt(t.dataset.step)));renderControls();renderLogo();return;}
  if(t.dataset.stepsp!==undefined){const i=parseInt(t.dataset.idx);lines[i].spacing=Math.min(2,Math.max(0.5,+(lines[i].spacing+parseFloat(t.dataset.stepsp)).toFixed(2)));renderControls();renderLogo();return;}
});
addBtn.addEventListener('click',()=>{if(lines.length<MAX_LINES){lines.push({text:'',font:'Ndot57',size:80,spacing:0.82,color:'#ffffff'});renderControls();renderLogo();}});

/* ── CREDIT EVENTS ── */
creditRows.addEventListener('input', e=>{
  const t=e.target,idx=parseInt(t.dataset.idx); if(isNaN(idx)) return;
  if(t.classList.contains('credit-text')) credits[idx].text=t.value;
  else if(t.classList.contains('credit-colorpicker')){credits[idx].color=t.value;t.closest('.credit-row').querySelector('.credit-hexinput').value=t.value;t.closest('.credit-row').querySelector('.color-swatch').style.background=t.value;}
  else if(t.classList.contains('credit-hexinput')){
    const v=t.value.startsWith('#')?t.value:'#'+t.value;
    if(/^#[0-9a-fA-F]{6}$/.test(v)){credits[idx].color=v;t.closest('.credit-row').querySelector('.credit-colorpicker').value=v;t.closest('.credit-row').querySelector('.color-swatch').style.background=v;}
  }
  renderLogo();
});
creditRows.addEventListener('click', e=>{if(e.target.dataset.cremove!==undefined){credits.splice(parseInt(e.target.dataset.cremove),1);renderCreditControls();renderLogo();}});
addCreditBtn.addEventListener('click',()=>{if(credits.length<MAX_CREDITS){credits.push({text:'',color:'#444444'});renderCreditControls();renderLogo();}});

/* ── DOWNLOAD ── */
async function downloadLogo() {
  await document.fonts.ready;
  const size=exportRes, scale=size/512;
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);
  ctx.fillStyle=bgColor;
  ctx.fillRect(0,0,512,512);
  const pad=56, avail=512-pad*2, lineData=[];
  lines.forEach(l=>{
    if(!l.text) return;
    ctx.font=`${l.size}px '${l.font}', monospace`;
    lineData.push({...l, w:ctx.measureText(l.text).width, h:l.size*l.spacing});
  });
  const totalH=lineData.reduce((a,l)=>a+l.h,0);
  let curY=(512-totalH)/2;
  lineData.forEach(ld=>{
    ctx.save();
    ctx.font=`${ld.size}px '${ld.font}', monospace`;
    ctx.fillStyle=ld.color;
    const sx=ld.w>avail?avail/ld.w:1;
    ctx.translate(pad,curY+ld.size*0.85);
    ctx.scale(sx,1); ctx.fillText(ld.text,0,0);
    ctx.restore(); curY+=ld.h;
  });
  if(credits.length){
    let cy=curY+10;
    credits.forEach(c=>{
      if(!c.text) return;
      ctx.font='11px monospace'; ctx.fillStyle=c.color;
      ctx.fillText(c.text.toUpperCase(),pad,cy+11); cy+=16;
    });
  }
  const a=document.createElement('a');
  a.download=`ndot-logo-${size}x${size}.png`;
  a.href=canvas.toDataURL('image/png'); a.click();
}
downloadBtn.addEventListener('click', downloadLogo);

/* ── RESPONSIVE ── */
const ro=new ResizeObserver(()=>applyPreviewScale());
ro.observe(mainArea);

/* ── INIT ── */
renderControls();
renderCreditControls();
renderLogo();
setExportRes(512);
applyPreviewScale();
</script>
</body>
</html>
